services:
  # ── Backend: FastAPI Web Service ──────────────────────────────
  - type: web
    name: aura-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./wellness_companion.db
      - key: HOST
        value: 0.0.0.0
      - key: DEBUG
        value: "false"
      - key: WHISPER_MODE
        value: local
      - key: WHISPER_MODEL
        value: base
      - key: TTS_PROVIDER
        value: gtts
      - key: DOCUMENTS_DIR
        value: ai_core/rag/documents
      - key: VECTOR_DB_DIR
        value: ai_core/rag/vectordb/store
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: EMBEDDING_DEVICE
        value: cpu
      - key: TOP_K
        value: "5"
      - key: SUMMARIZE_TRIGGER_TURNS
        value: "8"
      - key: SQLITE_DB_PATH
        value: homemind_dev.db
      - key: HOMEMIND_ENV
        value: production
      # ⚠️  Set these as Secret Env Vars in the Render Dashboard:
      - key: GROQ_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend: React/Vite Static Site ─────────────────────────
  - type: web
    name: aura-ai-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
